name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

defaults:
  run:
    working-directory: Gadya
    shell: bash

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: current_version
        run: |
          VERSION=$(grep -oP 'version:\s*"\K[^"]+' app.config.ts)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current_version.outputs.version }}"
          case "${{ inputs.version_bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          NEW_VERSION="${major}.${minor}.${patch}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in app.config.ts
        run: |
          sed -i 's/version: "[^"]*"/version: "${{ steps.bump.outputs.version }}"/' app.config.ts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('Gadya/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('Gadya/**/*.gradle*', 'Gadya/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Configure AndroidX and fix duplicate class conflicts
        run: |
          # Ensure gradle.properties has AndroidX enabled
          cat >> android/gradle.properties << 'PROPS'
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS
          
          # Add exclusion rules to the ROOT build.gradle (applies to all subprojects)
          cat >> android/build.gradle << 'ROOTGRADLE'

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.configurations.all {
                          resolutionStrategy {
                              force 'androidx.core:core:1.12.0'
                              force 'androidx.core:core-ktx:1.12.0'
                              force 'androidx.appcompat:appcompat:1.6.1'
                              force 'androidx.versionedparcelable:versionedparcelable:1.1.1'
                              force 'androidx.collection:collection:1.2.0'
                              force 'androidx.lifecycle:lifecycle-runtime:2.6.2'
                              force 'androidx.activity:activity:1.8.0'
                          }
                          exclude group: 'com.android.support'
                      }
                  }
              }
          }
          ROOTGRADLE

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: Gadya/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          NEW_NAME="gadya-${{ steps.bump.outputs.version }}.apk"
          cp "$APK_PATH" "android/app/build/outputs/apk/release/$NEW_NAME"

      - name: Commit version bump
        working-directory: .
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Gadya/app.config.ts
          git commit -m "Gadya v${{ steps.bump.outputs.version }}"
          git push

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadya-apk-${{ steps.bump.outputs.version }}
          path: Gadya/android/app/build/outputs/apk/release/gadya-*.apk
          retention-days: 90
