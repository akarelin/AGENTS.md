services:
  dapy:
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # LangChain/LangSmith
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=dapy-five

      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # DAPY config
      - DAPY_MODEL=openai:gpt-4o
      - PERSISTENCE_BACKEND=sqlite
      
    volumes:
      # Data persistence
      - /data/dapy:/app/data
      - /data/dapy/snapshots:/app/snapshots
      - /data/dapy/logs:/app/logs
      
      # Git configuration
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
      
      # Mount repositories (adjust path as needed)
      - /home/alex/repos:/repos
      
    working_dir: /repos
    stdin_open: true
    tty: true
    command: /bin/bash

  inspector:
    build:
      context: ../../
      dockerfile: Dockerfile.inspector
    restart: unless-stopped
    depends_on:
      - dapy
    environment:
      # Access to DAPY data
      - DAPY_SNAPSHOT_DIR=/app/snapshots
      - DAPY_LOGS_DIR=/app/logs
      - DAPY_DATA_DIR=/app/data
      
      # API keys (for remote inspection)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      
    volumes:
      # Shared volumes with dapy for inspection
      - /data/dapy:/app/data:ro
      - /data/dapy/snapshots:/app/snapshots:ro
      - /data/dapy/logs:/app/logs:ro

      # Debug packages export
      - /data/dapy/debug-packages:/app/debug-packages
      
    ports:
      - "8888:8888"  # Remote inspection API
    
    command: python -m dapy.inspector_service

  feedback-agent:
    build:
      context: ../../
      dockerfile: Dockerfile.inspector
    restart: unless-stopped
    depends_on:
      - dapy
    environment:
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_PROJECT=dapy-five
      
    volumes:
      # Tickets storage
      - /data/dapy/tickets:/app/tickets

    command: python -m dapy.feedback_agent --project dapy-five --tickets-dir /app/tickets --interval 60

  feedback-dashboard:
    build:
      context: ../../
      dockerfile: Dockerfile.inspector
    restart: unless-stopped
    depends_on:
      - feedback-agent
    environment:
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      
    volumes:
      # Read-only access to tickets
      - /data/dapy/tickets:/app/tickets:ro
      
    ports:
      - "8889:8889"
    
    command: python -m dapy.feedback_dashboard
