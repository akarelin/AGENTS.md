version: '3.8'

services:
  dapy-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dapy-dev
    environment:
      # LangChain/LangSmith
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=dapy-dev
      
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # DAPY config
      - DAPY_MODEL=${DAPY_MODEL:-openai:gpt-4o}
      - PERSISTENCE_BACKEND=sqlite
      
    volumes:
      # Mount source code for hot reload
      - ./dapy:/app/dapy
      - ./pyproject.toml:/app/pyproject.toml
      - ./README.md:/app/README.md
      
      # Data persistence
      - ./data:/app/data
      - ./snapshots:/app/snapshots
      - ./logs:/app/logs
      
      # Git configuration
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
      
      # Mount your repositories
      - ${REPO_PATH:-../repos}:/repos
      
    working_dir: /repos
    stdin_open: true
    tty: true
    networks:
      - dapy-dev-network
    command: /bin/bash

networks:
  dapy-dev-network:
    driver: bridge
