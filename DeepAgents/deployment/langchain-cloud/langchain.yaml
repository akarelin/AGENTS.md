# LangChain Cloud Deployment Configuration
# https://docs.langchain.com/cloud/deployment

name: dapy
version: 1.0.0

# Runtime configuration
runtime:
  python_version: "3.11"
  
# Entry point
entry_point: dapy.orchestrator:create_main_agent

# Dependencies
dependencies:
  - langchain>=0.3.0
  - langchain-openai>=0.2.0
  - langgraph>=0.2.0
  - langsmith>=0.2.0
  - click>=8.1.0
  - rich>=13.0.0
  - pyyaml>=6.0.0
  - gitpython>=3.1.0

# Environment variables (secrets managed separately)
environment:
  LANGCHAIN_TRACING_V2: "true"
  LANGCHAIN_PROJECT: "deepagents-cloud"
  DEEPAGENTS_MODEL: "openai:gpt-4o"
  PERSISTENCE_BACKEND: "postgres"

# Secrets (reference to LangChain Cloud secrets)
secrets:
  - LANGCHAIN_API_KEY
  - OPENAI_API_KEY
  - POSTGRES_CONN_STRING

# Resources
resources:
  memory: 2048  # MB
  cpu: 1.0      # vCPUs
  timeout: 600  # seconds

# Scaling
scaling:
  min_instances: 1
  max_instances: 5
  target_cpu_utilization: 0.7

# Health check
health_check:
  path: /health
  interval: 30
  timeout: 10
  retries: 3

# Logging
logging:
  level: INFO
  retention_days: 30
