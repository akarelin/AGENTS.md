version: '3.8'

services:
  dapy:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: dapy-cli
    environment:
      # LangChain/LangSmith
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=dapy-production
      
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # DAPY config
      - DAPY_MODEL=openai:gpt-4o
      - PERSISTENCE_BACKEND=postgres
      - POSTGRES_CONN_STRING=postgresql://dapy:${DB_PASSWORD}@postgres:5432/dapy
      
    volumes:
      - ./data:/app/data
      - ./snapshots:/app/snapshots
      - ./logs:/app/logs
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
      - ${REPO_PATH:-/home/ubuntu/repos}:/repos
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dapy-network
    command: dapy daemon --port 8000

  postgres:
    image: postgres:16-alpine
    container_name: dapy-postgres
    environment:
      - POSTGRES_DB=dapy
      - POSTGRES_USER=dapy
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dapy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dapy-network

  nginx:
    image: nginx:alpine
    container_name: dapy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - dapy
    restart: unless-stopped
    networks:
      - dapy-network

volumes:
  postgres_data:
    driver: local

networks:
  dapy-network:
    driver: bridge
