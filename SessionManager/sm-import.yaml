# ── Session Importer TUI manifest ────────────────────────────────────────────
# importers.py takes a positional path arg (the export ZIP/JSON) which the
# gppu launcher cannot prompt for, so the launcher entry only shows usage.
# Run it directly from the shell with the export path:
#   sm-import chatgpt <export.zip>   |   sm-import claude <export.zip>
manifest:
  name: Import (ChatGPT/Claude.ai)
  description: Convert ChatGPT and Claude.ai web exports → SessionManager JSONL
  script: scripts/importers.py
  icon: "\U0001F4E5"
  modes:
    default:
      name: Show Usage
      inline: true
