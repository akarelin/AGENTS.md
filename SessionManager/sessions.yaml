# ── SessionManager TUI manifest ──────────────────────────────────────────────
manifest:
  name: Remote Sessions
  description: List, rename, archive, deposit, and manage remote Langfuse sessions
  script: scripts/sm.py
  icon: "\U0001F4E1"
  modes:
    resume:
      name: Browse & Resume
      args: [resume]
      inline: true
    projects:
      name: Projects
      args: [projects]
      inline: true
    deposit-all:
      name: Deposit All Local → Langfuse
      args: [deposit-all]
      inline: true
    local:
      name: List Local Sessions
      args: [local]
      inline: true
