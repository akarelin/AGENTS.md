# SessionManager Discovery Rules
# Same format as preservator rules.yaml
#
# find.type:
#   folder_name   — match directory names
#   filename      — match file names
#   file_extension — match by extension
#   content_pattern — match file content (slow, exhaustive only)
#
# search:
#   quick       — user_home only (fast)
#   exhaustive  — all drives

skip_folders:
  - node_modules
  - .git
  - __pycache__
  - venv
  - .venv
  - site-packages
  - cache
  - Cache
  - CacheStorage
  - GPUCache
  - Code Cache
  - blob_storage
  - Session Storage

discovery_rules:
  # ── Known LLM dot-folders ────────────────────────────────────────────
  - name: llm_dotfolders
    find:
      type: folder_name
      patterns:
        - ".claude"
        - ".claude-vertex"
        - ".codex"
        - ".continue"
        - ".cursor"
        - ".gemini"
        - ".openai"
        - ".anthropic"
        - ".codeium"
        - ".aider"
        - ".openclaw"
    collect:
      type: jsonl_sessions
      patterns: ["*.jsonl"]
      exclude: ["*.reset.*", "audit.jsonl"]
    search:
      quick: user_home
      exhaustive: all_drives

  # ── Claude Desktop agent sessions ────────────────────────────────────
  - name: claude_desktop
    find:
      type: folder_name
      patterns:
        - "local-agent-mode-sessions"
      parent_patterns:
        - "Claude"
        - "claude"
    collect:
      type: jsonl_sessions
      patterns: ["*.jsonl"]
      exclude: ["audit.jsonl"]
    search:
      quick: user_home
      exhaustive: all_drives

  # ── Imported exports (ChatGPT, Claude.ai) ─────────────────────────────
  - name: imported_exports
    find:
      type: folder_name
      patterns:
        - "imported-chatgpt"
        - "imported-claude"
    collect:
      type: jsonl_sessions
      patterns: ["*.jsonl"]
      exclude: []
    search:
      quick: user_home
      exhaustive: all_drives

  # ── Content-based discovery (find unknown LLM logs) ──────────────────
  - name: llm_logs_content
    find:
      type: content_pattern
      file_extensions: [".jsonl", ".json"]
      strong_patterns:
        - '"parentUuid"'
        - '"isSidechain"'
        - '"role":"user"'
        - '"role":"assistant"'
        - '"role": "user"'
        - '"role": "assistant"'
      session_patterns:
        - '"sessionId"'
        - '"messageId"'
        - '"session_id"'
      min_size: 500
    collect:
      type: file
    search:
      quick: none
      exhaustive: all_drives
