# ── SessionSkills Pipeline TUI manifest ──────────────────────────────────────
manifest:
  name: Pipeline
  description: SessionSkills orchestrator — ingest, merge, name, analyze, classify, prune, archive
  script: scripts/sm-pipeline.py
  icon: "\U0001F501"
  modes:
    default:
      name: Run Default Pipeline
      args: [run, default]
    doctor:
      name: Doctor — health check
      args: [doctor]
      inline: true
    stats:
      name: Stats — counts by state
      args: [stats]
      inline: true
    ingest:
      name: Ingest — scan filesystem
      args: [run, ingest]
      inline: true
    merge:
      name: Merge — stitch reset/deleted/topic chains
      args: [run, merge]
      inline: true
    name-stage:
      name: Name — LLM slug + parallel symlink dir
      args: [run, name]
    analyze:
      name: Analyze — session-intel summary via Ollama
      args: [run, analyze]
    write_to_memory:
      name: Write to Memory — chunks → OpenClaw SQLite
      args: [run, write_to_memory]
    cluster:
      name: Cluster — sentence-transformers themes
      args: [run, cluster]
    classify:
      name: Classify — work-atoms project assignment
      args: [run, classify]
    link_project:
      name: Link Project — canonical registry
      args: [run, link_project]
    review:
      name: Review — collect low-confidence to queue
      args: [run, review]
      inline: true
    prune:
      name: Prune — move old to .trash
      args: [run, prune]
    archive:
      name: Archive — tar.gz old sessions
      args: [run, archive]
    nightly:
      name: Nightly — cluster + classify + link_project
      args: [run, nightly]
    weekly:
      name: Weekly — prune + archive
      args: [run, weekly]
    ingest-preservator:
      name: Ingest — preservator RAR archives
      args: [run, ingest, --source, preservator]
