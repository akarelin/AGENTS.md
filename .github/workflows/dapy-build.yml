name: DAPY Build

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

defaults:
  run:
    working-directory: DAPY

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('DAPY/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e .

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=dapy-v${NEW}" >> "$GITHUB_OUTPUT"

      - name: Bump version in pyproject.toml
        run: sed -i "s/^version = \"${{ steps.version.outputs.current }}\"/version = \"${{ steps.version.outputs.new }}\"/" pyproject.toml

      - name: Build distribution
        run: pip install build && python -m build

      - name: Commit version bump
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "Alex Karelin"
          git config user.email "alex@karelin.com"
          git add DAPY/pyproject.toml
          git commit -m "chore(dapy): bump version to ${{ steps.version.outputs.new }}"
          git tag "${{ steps.version.outputs.tag }}"
          git pull --rebase
          git push origin HEAD --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DAPY ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: DAPY/dist/*
