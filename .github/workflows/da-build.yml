name: DA Build

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
      run_tests:
        description: 'Run tests before release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: [self-hosted, linux]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      clean: ${{ steps.version.outputs.clean }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          BUMP="${{ inputs.bump }}"
          LATEST_TAG=$(git tag -l 'da-v*' --sort=-v:refname | grep -E '^da-v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's|^da-v||')
          if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
          if [ "$BUMP" = "none" ]; then
            VER="${LATEST_TAG}"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            if [ "$BUMP" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            VER="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=da-v${VER}" >> $GITHUB_OUTPUT
          echo "clean=${VER}" >> $GITHUB_OUTPUT

      - name: Create tag
        if: inputs.bump != 'none'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    needs: bump
    if: needs.bump.result == 'success'
    defaults:
      run:
        working-directory: DA
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: [self-hosted, linux]
            artifact: da-linux-amd64
            ext: ''
          - os: macos
            runner: macos-latest
            artifact: da-macos-arm64
            ext: ''
          - os: windows
            runner: [self-hosted, Windows]
            artifact: da-windows-amd64.exe
            ext: '.exe'
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.tag || github.ref }}
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: matrix.os != 'linux'
        with:
          python-version: '3.12'

      - name: Build binary (Linux)
        if: matrix.os == 'linux'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.bump.outputs.clean }}
        run: |
          python3 -m venv .venv
          .venv/bin/pip install pyinstaller setuptools-scm
          .venv/bin/pip install git+https://github.com/akarelin/gppu.git
          .venv/bin/pip install -e .
          .venv/bin/pyinstaller --onefile --name da \
            --hidden-import=da --hidden-import=da.cli --hidden-import=da.client \
            --hidden-import=da.config --hidden-import=da.session --hidden-import=da.tui \
            --hidden-import=da.rich_tui --hidden-import=da.rich_render --hidden-import=da.obsidian \
            --hidden-import=da.claude_sessions --hidden-import=da.session_manager \
            --hidden-import=da.history_analyzer --hidden-import=da.views.projects \
            --hidden-import=yaml --hidden-import=gppu --hidden-import=gppu.gppu \
            --hidden-import=gppu.ad --hidden-import=anthropic --hidden-import=paramiko \
            --hidden-import=jinja2 \
            --collect-all textual --collect-all rich --collect-all prompt_toolkit \
            --collect-all jinja2 --copy-metadata DA --copy-metadata gppu \
            da/cli.py

      - name: Build binary
        if: matrix.os != 'linux'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.bump.outputs.clean }}
        run: |
          pip install pyinstaller setuptools-scm
          pip install git+https://github.com/akarelin/gppu.git
          pip install -e .
          pyinstaller --onefile --name da --hidden-import=da --hidden-import=da.cli --hidden-import=da.client --hidden-import=da.config --hidden-import=da.session --hidden-import=da.tui --hidden-import=da.rich_tui --hidden-import=da.rich_render --hidden-import=da.obsidian --hidden-import=da.claude_sessions --hidden-import=da.session_manager --hidden-import=da.history_analyzer --hidden-import=da.views.projects --hidden-import=yaml --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=anthropic --hidden-import=paramiko --hidden-import=jinja2 --collect-all textual --collect-all rich --collect-all prompt_toolkit --collect-all jinja2 --copy-metadata DA --copy-metadata gppu da/cli.py

      - name: Rename artifact
        if: matrix.os != 'windows'
        run: mv dist/da dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows'
        run: Move-Item dist/da.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: DA/dist/${{ matrix.artifact }}

  release:
    needs: [bump, build]
    if: needs.build.result == 'success'
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute version
        id: version
        run: |
          TAG="${{ needs.bump.outputs.tag || github.ref_name }}"
          echo "clean=${TAG#da-v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag || github.ref_name }}
          name: DA v${{ steps.version.outputs.clean }}
          files: artifacts/*
          generate_release_notes: true

      - name: Update da/latest tag
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag -f da/latest
          git push -f origin da/latest
