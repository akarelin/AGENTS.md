name: DA Build

on:
  pull_request:
    branches: [master]
    paths: ['DA/**', 'DA/pyproject.toml']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
      run_tests:
        description: 'Run tests before release'
        type: boolean
        default: true

permissions:
  contents: write

defaults:
  run:
    working-directory: DA

jobs:
  test:
    runs-on: [self-hosted, linux]
    if: github.event_name == 'pull_request' || inputs.run_tests
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup and test
        run: |
          python3 -m venv .venv
          .venv/bin/pip install setuptools-scm
          .venv/bin/pip install -e ".[dev]"
          .venv/bin/ruff check da/

  release:
    needs: test
    if: >-
      always()
      && github.event_name == 'workflow_dispatch'
      && github.ref == 'refs/heads/master'
      && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute version
        run: |
          BUMP="${{ inputs.bump }}"
          LATEST_TAG=$(git tag -l 'da-v*' --sort=-v:refname | grep -E '^da-v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's|^da-v||')
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No existing da-v* tags found. Create an initial tag first (e.g. git tag da-v0.1.0)."
            exit 1
          fi
          if [ "$BUMP" = "none" ]; then
            echo "TAG=da-v${LATEST_TAG}" >> $GITHUB_ENV
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            if [ "$BUMP" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            echo "TAG=da-v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV
          fi

      - name: Create tag
        if: inputs.bump != 'none'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Checkout tag for rebuild
        if: inputs.bump == 'none'
        run: git checkout "${TAG}"

      - name: Build and release
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Compute release name
        run: echo "VERSION=${TAG#da-v}" >> $GITHUB_ENV

      - name: Create Release
        if: inputs.bump != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: DA v${{ env.VERSION }}
          files: DA/dist/*
          generate_release_notes: true

      - name: Upload assets to existing release
        if: inputs.bump == 'none'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${TAG}" dist/* --clobber

      - name: Update da/latest tag
        run: |
          git tag -f da/latest
          git push -f origin da/latest
