name: MCP Build

on:
  push:
    paths:
      - 'mcp/**'
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} mcp/
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
