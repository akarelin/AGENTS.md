name: Gadya APK

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

defaults:
  run:
    working-directory: Gadya

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]

    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      filename: ${{ steps.apk.outputs.filename }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read current version
        id: current_version
        run: |
          VERSION=$(sed -n 's/.*version: "\([^"]*\)".*/\1/p' app.config.ts)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current_version.outputs.version }}"
          case "${{ inputs.version_bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          NEW_VERSION="${major}.${minor}.${patch}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=gadya-v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in app.config.ts
        run: |
          sed -i 's/version: "[^"]*"/version: "${{ steps.bump.outputs.version }}"/' app.config.ts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('Gadya/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('Gadya/**/*.gradle*', 'Gadya/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Configure AndroidX and fix duplicate class conflicts
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          sed -i '/^android {/a\    configurations.all {\n        resolutionStrategy {\n            force "androidx.core:core:1.12.0"\n            force "androidx.core:core-ktx:1.12.0"\n            force "androidx.appcompat:appcompat:1.6.1"\n            force "androidx.versionedparcelable:versionedparcelable:1.1.1"\n            force "androidx.collection:collection:1.2.0"\n            force "androidx.lifecycle:lifecycle-runtime:2.6.2"\n            force "androidx.activity:activity:1.8.0"\n        }\n        exclude group: "com.android.support"\n    }' android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: Gadya/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Prepare APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          FILENAME="gadya-${{ steps.bump.outputs.version }}.apk"
          cp "$APK_PATH" "$FILENAME"
          echo "path=$FILENAME" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadya-apk-${{ steps.bump.outputs.version }}
          path: Gadya/${{ steps.apk.outputs.filename }}
          retention-days: 90

      - name: Upload modified app.config.ts
        uses: actions/upload-artifact@v4
        with:
          name: app-config
          path: Gadya/app.config.ts
          retention-days: 1

  release:
    runs-on: [self-hosted, Linux, X64]
    needs: [build]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: gadya-apk-${{ needs.build.outputs.version }}
          path: Gadya

      - name: Download modified app.config.ts
        uses: actions/download-artifact@v4
        with:
          name: app-config
          path: Gadya

      - name: Commit version bump via GitHub API
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          FILE_PATH="Gadya/app.config.ts"
          COMMIT_MSG="Gadya v${{ needs.build.outputs.version }}"
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/${REPO}/contents/${FILE_PATH}"

          # Get the latest file SHA from the remote (not local checkout)
          FILE_SHA=$(curl -sf -H "Authorization: token ${GITHUB_TOKEN}" \
            "${API}?ref=${BRANCH}" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          # Push the updated file directly via the API — atomic, no race condition
          CONTENT=$(base64 -w 0 "${FILE_PATH}")
          curl -sf -X PUT -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}" \
            -d "{\"message\":\"${COMMIT_MSG}\",\"content\":\"${CONTENT}\",\"sha\":\"${FILE_SHA}\",\"branch\":\"${BRANCH}\"}"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        working-directory: .
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          VERSION="${{ needs.build.outputs.version }}"
          FILENAME="${{ needs.build.outputs.filename }}"
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/${REPO}"

          # Create the release
          RELEASE_RESPONSE=$(curl -sf -X POST -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"Gadya v${VERSION}\",\"generate_release_notes\":true}")

          UPLOAD_URL=$(echo "${RELEASE_RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")

          # Upload the APK asset
          curl -sf -X POST -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "${UPLOAD_URL}?name=${FILENAME}" \
            --data-binary @"Gadya/${FILENAME}"
